<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-34</title>
    <style>
        .column {
            width: 30%;
            min-height: 150px;
            border: 2px solid #000;
            display: inline-block;
            vertical-align: top;
            margin: 10px;
            padding: 10px;
        }

        .task {
            background: lightgreen;
            margin: 5px;
            padding: 5px;
            cursor: grab;
        }
    </style>
</head>

<body>

    <div class="column" ondrop="drop(event)" ondragover="allowDrop(event)">
        <h3>TODO</h3>
        <div class="task" draggable="true">Task 1</div>
        <div class="task" draggable="true">Task 2</div>
        <div class="task" draggable="true">Task 3</div>
    </div>

    <div class="column" ondrop="drop(event)" ondragover="allowDrop(event)">
        <h3>IN PROGRESS</h3>
    </div>

    <div class="column" ondrop="drop(event)" ondragover="allowDrop(event)">
        <h3>DONE</h3>
    </div>
    <script src="script.js"></script>

</body>

</html>
