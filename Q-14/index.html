<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-14</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            overflow-y: hidden;
        }

        .design {
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
            background-image: linear-gradient(to right top, #b7d4ce, #aadfc6, #ade7b1, #c3eb93, #e6eb72);
            min-width: 400px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 20px;

        }

        .inputdesign {
            padding: 8px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .touch {
            cursor: pointer;

        }
    </style>
</head>

<body>
    <div class="design">
        <h2>Word Counter</h2>
        <textarea id="sentence" class="inputdesign"></textarea>
        <div id="error" style="color: red;"></div>
        <button onclick="count()" class="inputdesign touch">Count Words</button>
        <div id="result"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
