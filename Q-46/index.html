<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-46</title>
    <style>
        body {
            width: 100%;
            height: 100vh;
            position: relative;
            padding: 0%;
            margin: 0%;
            box-sizing: border-box;
            border: 2px solid;
        }

        #modalpopup {
            position: absolute;
            display: none;
            top:0;
            left: 0;
            width: 100%;
            height: 100%;
            /* z-index: 1; */
            background-color: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;


        }

        .inside {
            display: flex;
            flex-direction: column;
            padding: 20px;
            border-radius: 20px;
            width: 150px;
            height: 150px;

        }

        .inputdesign {
            padding: 8px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .touch {
            cursor: pointer;
            width: 100px;
        }

        .btn {
            display: flex;
            justify-content: space-evenly;

        }

        .heading {
            /* z-index: -1; */
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="heading">
        <h2>Login Modal Popup</h2>
<input type="file">
        <button onclick="openmodal()" class="inputdesign touch">Login</button>

    </div>

    <div id="modalpopup">
        <div style="background-color: wheat; width: 300px; height: 200px;" class="inside">
            <input type="email" placeholder="Enter Email" id="email" class="inputdesign">
            <input type="password" placeholder="Enter Password" id="password" class="inputdesign">
            <div id="error" style="color: red;"></div>
            <div class="btn">
                <button onclick="login()" class="inputdesign touch">Login</button>
                <button onclick="closemodal()" class="inputdesign touch">Close</button>
            </div>

            

        </div>

    </div>
    <script src="script.js"></script>
</body>

</html>
