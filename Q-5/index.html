<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-5</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            overflow-y: hidden;
        }

        .design {
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
            background: linear-gradient(65deg, rgba(42, 123, 155, 1) 0%, rgba(87, 199, 133, 1) 50%, rgba(108, 202, 126, 1) 57%);
            min-width: 400px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 20px;

        }

        .inputdesign {
            padding: 8px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .touch {
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="design">
        <h2>Largest Number Finder </h2>
        <input type="text" placeholder="enter like this 1,2" id="input-box" class="inputdesign">
        <div id="error" style="color: red;"></div>
        <button onclick="check()" class="inputdesign touch">Check</button>
        <div id="result"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
