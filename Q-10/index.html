<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-10</title>
</head>
<style>
    .register-form {
        display: flex;
        flex-direction: column;
    }

    .space {
        margin-bottom: 10px;
    }

    .star {
        color: red;
    }

    body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100dvh;
        overflow-y: hidden;
    }

    .design {
        box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
        background: #ff9191;
        background: radial-gradient(circle, rgb(103, 162, 230) 0%, rgb(101, 114, 233) 100%);
        min-width: 400px;
        min-height: 450px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        border-radius: 20px;

    }

    .inputdesign {
        padding: 8px;
        border-radius: 10px;
        margin-bottom: 10px;
    }

    .touch {
        cursor: pointer;

    }
</style>

<body>

    <div class="design">
        <h2>Registration Form </h2>
        <form action="" class="register-form" id="register">
            <label for="">FirstName <span class="star">*</span> <input type="text" class="space inputdesign"
                    required></label>
            <label for="">LastName<span class="star">*</span> <input type="text" class="space inputdesign"
                    required></label>

            <label for="">Email<span class="star">*</span> <input type="text" class="space inputdesign"
                    style="margin-right: 50px;" required></label>

            <label for="">Phone<span class="star">*</span> <input type="text" class="space inputdesign"
                    required></label>

            <label for="">Zipcode<span class="star">*</span> <input type="text" class="space inputdesign"
                    required></label>
            <label for="">Address<span class="star">*</span> <textarea name="" id="" class="inputdesign"
                    required></textarea></label>
            <div id="error"></div>

            <button type="submit" class="inputdesign touch">Register</button>

        </form>
    </div>
    <script src="script.js"></script>
</body>

</html>
