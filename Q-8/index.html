<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-8</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            overflow-y: hidden;
        }

        .design {
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
            background: #ff9191;
            background: radial-gradient(circle, rgba(255, 145, 145, 1) 0%, rgba(122, 122, 122, 1) 100%);
            min-width: 400px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 20px;

        }

        .inputdesign {
            padding: 8px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .touch {
            cursor: pointer;

        }
    </style>
</head>

<body>
    <div class="design">
        <h2>Replace Element in Array </h2>
        <input type="text" id="first-box" placeholder="Array elements (A,B,C,D) " class="inputdesign">
        <input type="number" id="position" class="inputdesign">
        <input type="text" id="new-box" placeholder="New element " class="inputdesign">
        <div id="error" style="color: red;"></div>
        <button onclick="replace()" class="inputdesign touch">Replace</button>
        <div id="result"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
