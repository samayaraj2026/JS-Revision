<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-29</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            overflow-y: hidden;
        }

        .design {
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
            background-image: linear-gradient(to left bottom, #7a7a9f, #9f8baf, #c19ebc, #e2b2c8, #ffc8d2);
            min-width: 450px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 20px;

        }

        .inputdesign {
            padding: 8px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

    </style>
</head>

<body>
    <div class="design">
        <h2>Form Auto Uppercase </h2>
        <input type="text" placeholder="Enter Text" id="upper" class="inputdesign">
        <p>Uppercase</p>
        <div id="result"></div>
    </div>
    <script src="script.js"></script>
