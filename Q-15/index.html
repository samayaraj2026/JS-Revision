<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-15</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            overflow-y: hidden;
        }

        .design {
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
            background-image: linear-gradient(to right top, #696ef6, #2995ff, #00b4ff, #50cfff, #90e7ff);
            min-width: 400px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 20px;

        }

        .inputdesign {
            padding: 8px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .touch {
            cursor: pointer;

        }
    </style>
</head>

<body>
    <div class="design">
        <h2>Palindrome Checker </h2>
        <input type="text" id="text-box" class="inputdesign">
        <div id="error" style="color: red;"></div>
        <button onclick="check()" class="inputdesign touch">Check Palindrome</button>
        <div id="result"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
