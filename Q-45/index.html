<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-45</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: linear-gradient(to right bottom, #dc467a, #c15fae, #927acd, #5b8ed3, #389bc6);
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
        }

        #modal45 {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
        }

        .touch {
            cursor: pointer;
            width: 150px;
            border-radius: 20px;
        }
    </style>
</head>

<body>
    <button onclick="openModal45()" class="touch">Open Modal</button>

    <div id="modal45">
        <div id="modalContent45" style="background:white; padding:20px; width:250px; margin:100px auto;">
            <h3>Modal</h3>
            <button onclick="closeModal45()" class="touch">Close</button>
        </div>

    </div>
    <script src="script.js"></script>
</body>

</html>
