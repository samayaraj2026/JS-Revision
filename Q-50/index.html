<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-50</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            /* overflow-y: hidden; */
        }

        .design {
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
            background: #ff9191;
            background-image: linear-gradient(to right bottom, #372105, #5d4800, #727900, #6eb000, #12eb4a);
            min-width: 400px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 20px;

        }

        .inputdesign {
            padding: 8px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .touch {
            cursor: pointer;
            width: 100px;

        }
    </style>
</head>

<body>
    <div class="design">
        <h2 style="color: white;">API Pagination </h2>
        <ul id="list">

        </ul>
        <span id="error"></span>
        <div style="display: flex; justify-content: space-around;">
            <button onclick="prev()" class="inputdesign touch">Previous</button>
            <button onclick="next()" class="inputdesign touch">Next</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
