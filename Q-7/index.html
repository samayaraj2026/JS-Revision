<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-7</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            overflow-y: hidden;
        }

        .design {
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
            background: #EEAECA;
            background: radial-gradient(circle, rgba(238, 174, 202, 1) 0%, rgba(148, 187, 233, 1) 100%);
            min-width: 400px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 20px;

        }

        .inputdesign {
            padding: 8px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .touch {
            cursor: pointer;

        }

        .touch2 {
            cursor: pointer;
            width:88px;
        }
    </style>
</head>

<body>
    <div class="design">
        <h2>Sum and Multiply</h2>
        <input type="text" id="input" class="inputdesign">
        <input type="text" id="output" class="inputdesign">
        <div id="error" style="color: red;"></div>
        <button onclick="add()" class="inputdesign touch2">ADD</button>
        <button onclick="multiply()" class="inputdesign touch">MULTIPLY</button>
        <div id="result"></div>
    </div>
    <script src="scirpt.js"></script>
</body>

</html>
