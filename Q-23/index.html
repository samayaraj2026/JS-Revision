<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-23</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            overflow-y: hidden;
        }

        .design {
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
            background-image: linear-gradient(to right top, #9f8f7a, #b3a887, #c2c498, #cbe1ad, #cfffc8);
            min-width: 450px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 20px;

        }

        .inputdesign {
            padding: 8px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .touch {
            cursor: pointer;
            width: 100px;
        }
    </style>
</head>

<body>
    <div class="design">
        <h2>Email Domain Extractor</h2>
        <input type="email" placeholder="enter email" id="emailid" class="inputdesign">
        <div id="error" style="color: red;"></div>
        <button id="sub-btn" class="inputdesign touch">submit</button>
        <div id="result"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
