<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-6</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            overflow-y: hidden;
        }

        .design {
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
            background: linear-gradient(65deg, rgb(218, 141, 54) 0%, rgb(218, 236, 111) 50%, rgb(233, 153, 134) 57%);
            min-width: 400px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 20px;

        }

        .inputdesign {
            padding: 8px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .touch {
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="design">
        <h2>Checkbox Manager</h2>
        <div style="display: flex;">
            <input type="checkbox" class="option" class="inputdesign">
            <input type="checkbox" class="option" class="inputdesign">
            <input type="checkbox" class="option" class="inputdesign">
            <input type="checkbox" class="option" class="inputdesign">
            <input type="checkbox" class="option" class="inputdesign">
        </div>
        <button onclick="checkall()" class="inputdesign touch">checkall</button>
        <button onclick="uncheck()" class="inputdesign touch">UnCheck All</button>
        <button onclick="toggle()" class="inputdesign touch">Toggle</button>
    </div>
    <script src="script.js"></script>
</body>

</html>
