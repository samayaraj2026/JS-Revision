<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-59</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            overflow-y: hidden;
        }

        .design {
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
           background-image: linear-gradient(to right top, #9bd6dc, #8ccdea, #96bff2, #b5acec, #d896d2);
            min-width: 400px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 20px;

        }

        .inputdesign {
            padding: 8px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .touch {
            cursor: pointer;
            width: 200px;
        }
    </style>
</head>

<body>
    <div class="design">
        <h2>Detect Internet Connection Status </h2>
        <button id="statusBtn" class="inputdesign touch">Check Internet Connection</button>
        <p id="status"></p>
    </div>
    <script src="script.js"></script>
</body>

</html>
