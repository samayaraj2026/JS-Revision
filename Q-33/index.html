<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-33</title>
    <style>
        body {
            font-family: Arial;
        }

        .upload-box {
            width: 300px;
            height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin: 50px auto;
            cursor: pointer;
            background-color: rgb(143, 223, 223);

        }

        .upload-box.active {
            border-color: rgb(0, 55, 128);
            background-color: #f0fff0;
        }

        #fileName {
            text-align: center;
            margin-top: 10px;
            font-weight: bold;
        }

        input {
            display: none;
        }
    </style>
</head>

<body>

    <div class="upload-box" id="dropArea">
        Drag file here<br>
        or click to upload<br>

    </div>

    <input type="file" id="fileInput" accept="image/*">

    <div id="fileName"></div>
    <script src="script.js"></script>
</body>

</html>
